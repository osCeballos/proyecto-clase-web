<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag & Drop UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-container">
      <div class="logo">DropMedia<span style="color:var(--color-primary)">.</span></div>
    </div>
  </header>

  <main class="content">
    <section class="drop-section">
      <div class="section-header">
        <h1>Cargador de Prácticas</h1>
        <p>Arrastra y suelta tus archivos del proyecto (.zip, .pdf, .jpg) para prepararlos antes de la entrega final.</p>
      </div>

      <!-- Subsystem Overlay UI Intersection Context Box -->
      <div class="drop-zone" id="drop-zone">
        <div class="drop-zone-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="drop-zone-text">
          <p class="main-text">Arrastra tus archivos aquí</p>
          <p class="sub-text">O haz clic para seleccionar de tu ordenador (Máx. 5MB)</p>
        </div>
        <input type="file" id="file-input" class="file-input" multiple>
      </div>

      <!-- Execution Target Component Map Generator Output Wrapper -->
      <div class="file-list-container">
        <h3>Archivos Preparados (<span id="file-count">0</span>)</h3>
        <ul class="file-list" id="file-list">
          <!-- Element Injection Hook Logic -->
        </ul>
      </div>

    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
