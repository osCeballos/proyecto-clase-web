<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validación Nativa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-container">
      <div class="logo">ValidForm<span style="color:var(--color-primary)">.</span></div>
    </div>
  </header>

  <main class="content">
    <section class="form-section">
      <div class="section-header">
        <h1>Registro de Alumno</h1>
        <p>Completa tus datos para acceder a la plataforma de aprendizaje y comenzar tu formación.</p>
      </div>

      <form class="custom-form" id="registration-form" novalidate>
        
        <!-- Required Text Input Config -->
        <div class="form-group">
          <label for="username">Nombre Completo</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Ej. Juan Pérez" 
            required 
            minlength="3"
            pattern="[A-Za-z\s]+"
          >
          <span class="error-message" aria-live="polite"></span>
          <span class="help-text">Introduce tu nombre y apellidos (mínimo 3 caracteres).</span>
        </div>

        <!-- Constrained Input Setup (Email Type Override) -->
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="usuario@ejemplo.com" 
            required
          >
          <span class="error-message" aria-live="polite"></span>
        </div>

        <!-- Masked Text Payload Field with Realtime Evaluation UI Decorators -->
        <div class="form-group">
          <label for="password">Contraseña de Seguridad</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required
            minlength="8"
          >
          <span class="error-message" aria-live="polite"></span>
          <div class="password-strength">
            <div class="strength-bar"></div>
          </div>
        </div>

        <button type="submit" class="btn-submit">Finalizar Registro</button>

      </form>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
