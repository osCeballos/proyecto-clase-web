<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Dinámico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="hero">
    <div class="hero-container">
      <p class="eyebrow">Expertos en Desarrollo Web</p>
      
      <!-- Texto consolidado para lector de pantallas -->
      <h1 class="title" aria-label="Soy especialista en crear experiencias interactivas y modernas">
        <span class="typewriter-text" id="typewriter" aria-hidden="true"></span>
      </h1>
      
      <p class="subtitle">Ayudamos a las empresas a transformar sus ideas en productos digitales de alto impacto mediante código limpio y diseño innovador.</p>
      
      <button class="cta-btn">Ver Proyectos</button>
    </div>
  </main>

  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
  <script src="main.js"></script>
</body>
</html>
