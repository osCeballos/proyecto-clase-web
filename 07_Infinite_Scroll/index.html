<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Infinito</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="feed-container">
    <header class="feed-header">
      <h1>Feed de Noticias</h1>
      <p>Descubre las últimas actualizaciones y artículos destacados de la semana.</p>
    </header>

    <!-- Contenedor del Feed de Tarjetas -->
    <section class="feed-grid" id="feed-grid" aria-live="polite">
    </section>

    <!-- Elemento Observador Centinela / Indicador de Carga -->
    <div class="loading-indicator" id="loading-indicator" aria-hidden="true">
      <div class="spinner"></div>
      <span>Cargando más artículos...</span>
    </div>
    
    <!-- Estado final -->
    <div class="end-message" id="end-message" hidden>
      <p>¡Has llegado al final de las noticias por hoy! 🎉</p>
    </div>

  </main>

  <script src="main.js"></script>
</body>
</html>
